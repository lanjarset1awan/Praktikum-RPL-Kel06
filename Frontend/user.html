<!DOCTYPE html>
<html>

<head>
    <title>User Page</title>
</head>

<body>

    <h1>USER DASHBOARD</h1>

    <div>
        <h3>Data Kamu</h3>
        <p><b>Name:</b> <span id="viewName"></span></p>
        <p><b>Email:</b> <span id="viewEmail"></span></p>
    </div>

    <h3>Foto Profil</h3>

    <img id="profileImg" width="120"><br><br>

    <input type="file" id="profilePhoto"><br><br>

    <button onclick="uploadPhoto()">Upload Foto</button>

    <hr>

    <button onclick="showEdit()">Edit Profile</button>
    <button onclick="logout()">Logout</button>

    <div id="editForm" style="display:none;">
        <h3>Edit Profile</h3>
        <input id="name"><br><br>
        <input id="email"><br><br>
        <input id="password"><br><br>
        <button onclick="updateUser()">Simpan</button>
    </div>

    <hr>

    <h3>Create Report</h3>

    <input id="title" placeholder="Judul"><br><br>

    <select id="category">
        <option value="urgent">Urgent</option>
        <option value="normal">Normal</option>
    </select><br><br>

    <!-- 🔥 FIX: rename biar ga bentrok -->
    <input id="reportLocation" placeholder="Lokasi"><br><br>

    <textarea id="description" placeholder="Deskripsi"></textarea><br><br>

    <input type="file" id="photo"><br><br>

    <button onclick="createReport()">Kirim</button>

    <hr>

    <h3>Edit Report</h3>

    <input type="hidden" id="editId">

    <input id="editTitle"><br><br>

    <select id="editCategory">
        <option value="urgent">Urgent</option>
        <option value="normal">Normal</option>
    </select><br><br>

    <!-- 🔥 FIX -->
    <input id="editReportLocation"><br><br>

    <textarea id="editDescription"></textarea><br><br>

    <input type="file" id="editPhoto"><br><br>

    <button onclick="updateReport()">Update</button>

    <hr>

    <h3>My Reports</h3>
    <div id="reportList"></div>

    <script>
        const API = "http://localhost:2000";
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) location.href = "index.html";

        const userId = Number(user.id);

        // =====================
        // LOAD USER
        // =====================
        async function loadUser() {
            const res = await fetch(`${API}/users/${userId}`);
            const data = await res.json();

            document.getElementById("viewName").innerText = data.name;
            document.getElementById("viewEmail").innerText = data.email;

            document.getElementById("name").value = data.name;
            document.getElementById("email").value = data.email;
            document.getElementById("password").value = data.password;

            document.getElementById("profileImg").src =
                data.photo || "https://via.placeholder.com/120";
        }
        loadUser();

        function showEdit() {
            document.getElementById("editForm").style.display = "block";
        }

        // =====================
        // UPDATE USER
        // =====================
        async function updateUser() {
            const res = await fetch(`${API}/users/${userId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: name.value,
                    email: email.value,
                    password: password.value
                })
            });

            const data = await res.json();
            localStorage.setItem("user", JSON.stringify(data.data));
            alert("Updated");
            loadUser();
        }

        // =====================
        // CREATE REPORT
        // =====================
        async function createReport() {
            const formData = new FormData();

            formData.append("title", title.value);
            formData.append("category", category.value);
            formData.append("location", reportLocation.value);
            formData.append("description", description.value);
            formData.append("userId", userId);
            formData.append("status", "pending");

            const file = photo.files[0];
            if (file) formData.append("photo", file);

            await fetch(`${API}/reports`, {
                method: "POST",
                body: formData
            });

            alert("Report terkirim");
            loadReports();
        }

        // =====================
        // LOAD REPORTS
        // =====================
        async function loadReports() {
            const res = await fetch(`${API}/reports`);
            const data = await res.json();

            const myReports = data.filter(r => Number(r.userId) === userId);

            document.getElementById("reportList").innerHTML = myReports.map(r => `
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <b>${r.title}</b><br>
            ${r.category}<br>
            ${r.location}<br>
            ${r.description}<br>

            ${r.photo ? `<img src="${r.photo}" width="150"><br>` : ""}

            <b>Status:</b> ${r.status}<br>
            ${r.admin ? `<b>Diproses oleh:</b> ${r.admin?.username}<br>` : ""}

            <br>
            <button onclick="editReport(${r.id}, \`${r.title}\`, \`${r.category}\`, \`${r.location}\`, \`${r.description}\`)">
                Edit
            </button>

            <button onclick="deleteReport(${r.id})">Hapus</button>
        </div>
    `).join("");
        }
        loadReports();

        // =====================
        // EDIT
        // =====================
        function editReport(id, t, c, l, d) {
            editId.value = id;
            editTitle.value = t;
            editCategory.value = c;
            editReportLocation.value = l;
            editDescription.value = d;
        }

        // =====================
        // UPDATE REPORT
        // =====================
        async function updateReport() {
            const id = editId.value;

            const formData = new FormData();
            formData.append("title", editTitle.value);
            formData.append("category", editCategory.value);
            formData.append("location", editReportLocation.value);
            formData.append("description", editDescription.value);

            const file = editPhoto.files[0];
            if (file) formData.append("photo", file);

            await fetch(`${API}/reports/${id}`, {
                method: "PUT",
                body: formData
            });

            alert("Updated");
            loadReports();
        }

        // =====================
        // DELETE
        // =====================
        async function deleteReport(id) {
            if (!confirm("Yakin?")) return;

            await fetch(`${API}/reports/${id}`, {
                method: "DELETE"
            });

            loadReports();
        }

        // =====================
        // UPLOAD FOTO PROFILE
        // =====================
        async function uploadPhoto() {
            const file = profilePhoto.files[0];

            if (!file) return alert("Pilih foto dulu");

            const formData = new FormData();
            formData.append("photo", file);

            const res = await fetch(`${API}/users/${userId}/photo`, {
                method: "PUT",
                body: formData
            });

            const data = await res.json();

            localStorage.setItem("user", JSON.stringify(data.data));

            alert("Foto berhasil diupload");
            loadUser();
        }

        // =====================
        // LOGOUT
        // =====================
        function logout() {
            localStorage.removeItem("user");
            location.href = "index.html";
        }
    </script>
</body>

</html>
