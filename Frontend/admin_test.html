<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
</head>

<body>

    <h1>ADMIN DASHBOARD</h1>

    <h3>Data Admin</h3>

    <p><b>Username:</b> <span id="viewUsername"></span></p>
    <p><b>Email:</b> <span id="viewEmail"></span></p>

    <img id="profileImg" width="120"><br><br>

    <input type="file" id="profilePhoto"><br><br>
    <button onclick="uploadPhoto()">Upload Foto</button>

    <hr>

    <button onclick="showEdit()">Edit Profile</button>

    <div id="editForm" style="display:none;">
        <input id="username" placeholder="Username"><br><br>
        <input id="email" placeholder="Email"><br><br>
        <input id="password" placeholder="Password"><br><br>
        <button onclick="updateAdmin()">Simpan</button>
    </div>

    <hr>

    <h3>All Reports</h3>

    <div id="list"></div>

    <button onclick="loadReports()">Refresh</button>
    <button onclick="logout()">Logout</button>

    <hr>

    <h3>Edit Report</h3>

    <input type="hidden" id="editId">

    <input id="editTitle" placeholder="Title"><br><br>

    <select id="editCategory">
        <option value="urgent">Urgent</option>
        <option value="normal">Normal</option>
    </select><br><br>

    <input id="editLocation" placeholder="Location"><br><br>

    <textarea id="editDescription" placeholder="Description"></textarea><br><br>

    <input type="file" id="editPhoto"><br><br>

    <select id="editStatus">
        <option value="pending">Pending</option>
        <option value="process">Process</option>
        <option value="done">Done</option>
    </select><br><br>

    <button onclick="updateReport()">Update Report</button>

    <script>
        const API = "http://localhost:2000";

        // =====================
        // AUTH CHECK
        // =====================
        const admin = JSON.parse(localStorage.getItem("admin"));
        const adminId = admin?.id_admin;

        if (!admin || !adminId) {
            alert("akses ditolak");
            location.href = "index.html";
        }

        // =====================
        // LOAD ADMIN
        // =====================
        async function loadAdmin() {
            try {
                const res = await fetch(`${API}/admin/${adminId}`);

                if (!res.ok) {
                    const text = await res.text();
                    console.error("ERROR ADMIN:", text);
                    return alert("Gagal load admin");
                }

                const data = await res.json();

                viewUsername.innerText = data.username;
                viewEmail.innerText = data.email;

                username.value = data.username;
                email.value = data.email;
                password.value = data.password;

                profileImg.src = data.photo || "https://via.placeholder.com/120";

            } catch (err) {
                console.error(err);
            }
        }

        // =====================
        // UPDATE ADMIN
        // =====================
        async function updateAdmin() {
            try {
                const res = await fetch(`${API}/admin/${adminId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: username.value,
                        email: email.value,
                        password: password.value
                    })
                });

                if (!res.ok) {
                    const text = await res.text();
                    console.error("UPDATE ERROR:", text);
                    return alert("Gagal update");
                }

                const data = await res.json();

                localStorage.setItem("admin", JSON.stringify(data.data));

                alert("Updated");
                loadAdmin();

            } catch (err) {
                console.error(err);
            }
        }

        // =====================
        // UPLOAD FOTO
        // =====================
        async function uploadPhoto() {
            const file = profilePhoto.files[0];

            if (!file) return alert("Pilih foto dulu");

            try {
                const formData = new FormData();
                formData.append("photo", file);

                const res = await fetch(`${API}/admin/${adminId}/photo`, {
                    method: "PUT",
                    body: formData
                });

                if (!res.ok) {
                    const text = await res.text();
                    console.error("UPLOAD ERROR:", text);
                    return alert("Gagal upload");
                }

                const data = await res.json();

                localStorage.setItem("admin", JSON.stringify(data.data));

                alert("Foto berhasil diupload");
                loadAdmin();

            } catch (err) {
                console.error(err);
            }
        }

        function showEdit() {
            editForm.style.display = "block";
        }

        // =====================
        // LOAD REPORTS
        // =====================
        async function loadReports() {
            try {
                const res = await fetch(`${API}/reports`);

                if (!res.ok) {
                    const text = await res.text();
                    console.error("REPORT ERROR:", text);
                    return;
                }

                const data = await res.json();

                list.innerHTML = data.map(r => `
                    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                        <b>${r.title}</b><br>
                        ${r.category}<br>
                        ${r.location}<br>
                        ${r.description}<br>

                        ${r.photo ? `<img src="${r.photo}" width="150"><br>` : "Tidak ada foto<br>"}

                        <b>Status:</b> ${r.status}<br>
                        ${r.admin ? `<b>Diproses oleh:</b> ${r.admin.username}<br>` : ""}

                        <br>

                        <button onclick="editReport(${r.id}, \`${r.title}\`, \`${r.category}\`, \`${r.location}\`, \`${r.description}\`, \`${r.status}\`)">
                            Edit
                        </button>

                        <button onclick="deleteReport(${r.id})">
                            Hapus
                        </button>
                    </div>
                `).join("");

            } catch (err) {
                console.error(err);
            }
        }

        // =====================
        // EDIT REPORT
        // =====================
        function editReport(id, title, category, location, description, status) {
            editId.value = id;
            editTitle.value = title;
            editCategory.value = category;
            editLocation.value = location;
            editDescription.value = description;
            editStatus.value = status;
        }

        // =====================
        // UPDATE REPORT
        // =====================
        async function updateReport() {
            try {
                const id = editId.value;

                const formData = new FormData();
                formData.append("title", editTitle.value);
                formData.append("category", editCategory.value);
                formData.append("location", editLocation.value);
                formData.append("description", editDescription.value);
                formData.append("status", editStatus.value);
                formData.append("adminId", adminId);

                const file = editPhoto.files[0];
                if (file) formData.append("photo", file);

                const res = await fetch(`${API}/reports/${id}`, {
                    method: "PUT",
                    body: formData
                });

                if (!res.ok) {
                    const text = await res.text();
                    console.error("UPDATE REPORT ERROR:", text);
                    return alert("Gagal update report");
                }

                alert("Report updated");
                loadReports();

            } catch (err) {
                console.error(err);
            }
        }

        // =====================
        // DELETE REPORT
        // =====================
        async function deleteReport(id) {
            if (!confirm("Yakin mau hapus report ini?")) return;

            try {
                const res = await fetch(`${API}/reports/${id}`, {
                    method: "DELETE"
                });

                if (!res.ok) {
                    const text = await res.text();
                    console.error("DELETE ERROR:", text);
                    return alert("Gagal hapus");
                }

                alert("Report deleted");
                loadReports();

            } catch (err) {
                console.error(err);
            }
        }

        // =====================
        // LOGOUT
        // =====================
        function logout() {
            localStorage.removeItem("admin");
            location.href = "index.html";
        }

        // INIT
        loadAdmin();
        loadReports();
    </script>

</body>

</html>
